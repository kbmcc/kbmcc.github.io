<html>
<head>
  <meta charset="UTF-8">
  <script language="javascript" type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <style> body {padding: 0; margin: 10;} </style>
</head>
<body>
  <script>
  let playing = false;
  let video;
  let img;

  function preload() {
    img = loadImage('/assets/crows_17C_Japan.png');
    video = createVideo(['/assets/JoyDivisionShesLost Control.mp4']);
  }

  function setup() {
    createCanvas(windowWidth, windowHeight);
    video.size(width, height);
    video.hide();
  }

  function draw() {
    background(0);

    if (!playing) {
      // Show crow image as poster before video plays
      image(img, 0, 0, width, height);
    } else {
      // Show video once playing
      image(video, 0, 0, width, height);
    }

    if (!playing) {
      drawPlayButton();
    }
  }

  function drawPlayButton() {
    let cx = width / 2;
    let cy = height / 2;
    let r = 40;

    fill(0, 0, 0, 150);
    noStroke();
    circle(cx, cy, r * 2);

    fill(255);
    triangle(
      cx - r * 0.3, cy - r * 0.5,
      cx - r * 0.3, cy + r * 0.5,
      cx + r * 0.6, cy
    );
  }

  function mousePressed() {
    let cx = width / 2;
    let cy = height / 2;
    let r = 40;

    if (dist(mouseX, mouseY, cx, cy) < r) {
      toggleVid();
    }
  }

  function toggleVid() {
    if (playing) {
      video.pause();
    } else {
      video.loop();
    }
    playing = !playing;
  }
  </script>
</body>
</html>
