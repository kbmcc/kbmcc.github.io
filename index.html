<html>
<head>
  <meta charset="UTF-8">
  <script language="javascript" type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/addons/p5.sound.min.js"></script>
 <link rel="stylesheet" type="text/css" href="css/style.css">

<body>
  <script>
// Coding Train / Daniel Shiffman
// Sound Visualization:  Frequency analysis with FFT

// Code for https://www.youtube.com/watch?v=2O3nm0Nvbi4

// "Just Like a Rainbow" by the Columbians (rainbow.mp3) can be downloaded from
// https://github.com/CodingTrain/website-archive/blob/main/Tutorials/P5JS/p5.js_sound/17.1_playSong/rainbow.mp3

let song;
let fft;
let w;
let button;

function preload() {
  song = loadSound("/assets/JoyDivisionShesLost Control.mp4");
}

function setup() {
  createCanvas(256, 256);
  colorMode(HSB);
  angleMode(DEGREES);
  button = createButton("toggle");
  button.mousePressed(toggleSong);
  song.play();

  // Set smoothing to 0, 256 bins
  fft = new p5.FFT(0.9, 64);
  w = width / 64;
}

function toggleSong() {
  if (song.isPlaying()) {
    song.pause();
  } else {
    song.play();
  }
}

function draw() {
  background(0);
  let spectrum = fft.analyze();
  // console.log(spectrum);
  // stroke(255);
  for (let i = 0; i < spectrum.length; i++) {
    let ampl = spectrum[i];
    fill(i, 255, 255);
    let y = map(ampl, 0, 256, height, 0);
    rect(i*w, y, w, height - y);
  }
  // Default length is 1024;
  // console.log(spectrum.length);

  // translate(width / 2, height / 2);
  // //beginShape();
  // for (let i = 0; i < spectrum.length; i++) {
  //   let angle = map(i, 0, spectrum.length, 0, 360);
  //   let ampl = spectrum[i];
  //   let r = map(ampl, 0, 256, 20, 100);
  //   //fill(i, 255, 255);
  //   let x = r * cos(angle);
  //   let y = r * sin(angle);
  //   stroke(i, 255, 255);
  //   line(0, 0, x, y);
  //   //vertex(x, y);
  // }
  // //endShape();
}
  </script>
</body>
</html>
